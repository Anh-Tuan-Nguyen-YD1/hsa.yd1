<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - DAP AN TOAN THAY AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        /* Tùy chỉnh thanh cuộn cho giống Google Drive */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Google Drive Logo" class="w-8 h-8">
            <span class="text-xl font-medium text-gray-600">Drive</span>
        </div>
        <div class="flex-1 max-w-xl mx-8 hidden md:block">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                </span>
                <input type="text" placeholder="Tìm trong Drive" class="w-full bg-gray-100 border border-transparent focus:bg-white focus:border-blue-500 rounded-full py-2 pl-10 pr-4 outline-none transition duration-200 text-sm">
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <i class="fa-regular fa-circle-question text-xl text-gray-600 cursor-pointer"></i>
            <i class="fa-solid fa-gear text-xl text-gray-600 cursor-pointer"></i>
            <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm cursor-pointer">A</div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex flex-1">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-gray-200 p-4 hidden lg:block bg-white">
            <button class="flex items-center space-x-3 px-6 py-3 bg-white border border-gray-300 rounded-full shadow-sm hover:shadow-md transition duration-200 mb-6">
                <i class="fa-solid fa-plus text-lg text-blue-600"></i>
                <span class="font-medium text-sm">Mới</span>
            </button>
            <nav class="space-y-1">
                <a href="#" class="flex items-center space-x-3 px-4 py-2 bg-blue-50 text-blue-700 rounded-r-full font-medium text-sm">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>Drive của tôi</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-r-full text-sm">
                    <i class="fa-solid fa-laptop"></i>
                    <span>Máy tính</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-r-full text-sm">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Được chia sẻ với tôi</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-r-full text-sm">
                    <i class="fa-regular fa-clock"></i>
                    <span>Gần đây</span>
                </a>
            </nav>
        </aside>

        <!-- File Explorer -->
        <main class="flex-1 p-6 flex flex-col">
            <!-- Explorer Header -->
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-xl font-semibold text-gray-800">DAPANTOANTHAYAI</h1>
                
                <!-- Nút chuyển đổi chế độ xem (Giống hệt ảnh của bạn) -->
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-gray-100 border border-gray-300 rounded-full p-0.5">
                        <!-- Nút Xem Danh Sách -->
                        <button id="btn-list-view" class="px-4 py-1.5 rounded-full transition duration-200 text-gray-600" title="Chế độ danh sách">
                            <i class="fa-solid fa-list-ul"></i>
                        </button>
                        <!-- Nút Xem Dạng Lưới -->
                        <button id="btn-grid-view" class="px-4 py-1.5 rounded-full transition duration-200 bg-blue-100 text-blue-700 shadow-sm" title="Chế độ lưới">
                            <i class="fa-solid fa-table-cells-large"></i>
                        </button>
                    </div>
                    <button class="p-2 hover:bg-gray-100 rounded-full text-gray-500"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </div>

            <!-- Trạng thái tải dữ liệu -->
            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-gray-500 text-sm">Đang tải danh sách file...</p>
            </div>

            <!-- Vùng hiển thị file dạng LƯỚI (Mặc định) -->
            <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>

            <!-- Vùng hiển thị file dạng DANH SÁCH (Ẩn lúc đầu) -->
            <div id="list-container" class="bg-white border border-gray-200 rounded-lg overflow-hidden hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 bg-gray-50 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                            <th class="px-6 py-3 w-1/2">Tên</th>
                            <th class="px-6 py-3">Chủ sở hữu</th>
                            <th class="px-6 py-3">Kích cỡ tệp</th>
                        </tr>
                    </thead>
                    <tbody id="list-tbody">
                        <!-- File danh sách sẽ render ở đây -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- KHU VỰC TRÌNH XEM PDF ONLINE (Google Drive Style Modal) -->
    <div id="pdf-viewer-modal" class="fixed inset-0 bg-black/95 z-50 flex flex-col hidden">
        <!-- Thanh công cụ phía trên -->
        <div class="flex items-center justify-between px-6 py-3 border-b border-zinc-800 text-white bg-zinc-900">
            <div class="flex items-center space-x-3 overflow-hidden">
                <i class="fa-solid fa-file-pdf text-red-500 text-xl"></i>
                <span id="pdf-viewer-title" class="font-medium text-sm md:text-base truncate max-w-xs sm:max-w-md">Tên tài liệu.pdf</span>
            </div>
            <div class="flex items-center space-x-3">
                <!-- Nút Tải xuống -->
                <a id="pdf-viewer-download" href="#" download class="p-2 hover:bg-zinc-800 rounded-full transition text-zinc-300" title="Tải xuống">
                    <i class="fa-solid fa-download text-lg"></i>
                </a>
                <!-- Nút Đóng -->
                <button id="pdf-viewer-close" class="p-2 hover:bg-zinc-800 rounded-full transition text-zinc-300" title="Đóng">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
        </div>
        <!-- Vùng hiển thị nội dung PDF -->
        <div class="flex-1 w-full bg-zinc-900 flex justify-center items-center">
            <iframe id="pdf-iframe" class="w-full h-full border-none" src="" allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        // Cấu hình GitHub Repository (Nếu chuyển sang Public thì không cần TOKEN)
        const OWNER = 'Anh-Tuan-Nguyen-YD1';
        const REPO = 'hsa.yd1';
        const PATH = 'DAPANTOANTHAYAI';
        const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;
        
        // Nếu dùng kho Private, hãy dán Token của bạn vào đây. Nếu dùng kho Public, hãy để trống ''
        const GITHUB_TOKEN = ''; 

        let globalFiles = [];
        let currentView = 'grid'; // 'grid' hoặc 'list'

        const headers = GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {};

        // Sắp xếp tự nhiên (1, 2, 3... 10, 11)
        function naturalSort(a, b) {
            return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
        }

        // Định dạng kích thước file từ byte sang KB/MB
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Đọc link video từ file .txt
        async function fetchTxtContent(downloadUrl) {
            try {
                const response = await fetch(downloadUrl, { headers });
                if (!response.ok) return null;
                const text = await response.text();
                return text.trim();
            } catch (error) {
                return null;
            }
        }

        // Khởi chạy lấy dữ liệu
        async function init() {
            try {
                const response = await fetch(API_URL, { headers });
                if (!response.ok) throw new Error("Không thể kết nối với GitHub API.");
                
                let files = await response.json();
                files = files.filter(f => f.type === 'file');
                files.sort(naturalSort);

                // Lưu dữ liệu vào biến toàn cục và xử lý link video cho các file txt trước
                globalFiles = await Promise.all(files.map(async file => {
                    let viewUrl = file.html_url;
                    const isPdf = file.name.endsWith('.pdf');
                    const isTxt = file.name.endsWith('.txt');

                    if (isPdf) {
                        viewUrl = file.download_url; // Dùng link tải trực tiếp để nhúng vào trình xem PDF
                    } else if (isTxt) {
                        const link = await fetchTxtContent(file.download_url);
                        if (link && link.startsWith('http')) {
                            viewUrl = link;
                        }
                    }

                    return {
                        name: file.name,
                        size: file.size,
                        isPdf,
                        isTxt,
                        url: viewUrl
                    };
                }));

                document.getElementById('loading').classList.add('hidden');
                renderData();

            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-semibold">${error.message}</p>`;
            }
        }

        // Render dữ liệu ra giao diện tùy theo chế độ xem
        function renderData() {
            const gridContainer = document.getElementById('grid-container');
            const listContainer = document.getElementById('list-container');
            const listTbody = document.getElementById('list-tbody');

            gridContainer.innerHTML = '';
            listTbody.innerHTML = '';

            if (currentView === 'grid') {
                gridContainer.classList.remove('hidden');
                listContainer.classList.add('hidden');

                globalFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = "flex flex-col bg-white border border-gray-200 rounded-lg hover:shadow-md hover:border-blue-400 transition duration-200 p-4 cursor-pointer";
                    
                    const iconClass = file.isPdf ? "fa-solid fa-file-pdf text-red-500 text-3xl" : "fa-solid fa-circle-play text-red-600 text-3xl";

                    card.innerHTML = `
                        <div class="flex items-center justify-center h-24 bg-gray-50 rounded-md mb-3">
                            <i class="${iconClass}"></i>
                        </div>
                        <div class="flex items-start space-x-2">
                            <i class="${file.isPdf ? 'fa-solid fa-file-pdf text-red-500' : 'fa-solid fa-video text-red-600'} mt-1 text-sm"></i>
                            <span class="text-sm font-medium text-gray-700 truncate w-full" title="${file.name}">
                                ${file.name}
                            </span>
                        </div>
                    `;
                    card.addEventListener('click', () => handleFileClick(file));
                    gridContainer.appendChild(card);
                });

            } else {
                gridContainer.classList.add('hidden');
                listContainer.classList.remove('hidden');

                globalFiles.forEach(file => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-100 hover:bg-blue-50/50 transition cursor-pointer text-sm text-gray-700";
                    
                    const iconClass = file.isPdf ? "fa-solid fa-file-pdf text-red-500 text-lg" : "fa-solid fa-video text-red-600 text-lg";

                    tr.innerHTML = `
                        <td class="px-6 py-3.5 flex items-center space-x-3 truncate">
                            <i class="${iconClass}"></i>
                            <span class="font-medium truncate max-w-xs md:max-w-md">${file.name}</span>
                        </td>
                        <td class="px-6 py-3.5 text-gray-500">Tôi</td>
                        <td class="px-6 py-3.5 text-gray-500">${formatBytes(file.size)}</td>
                    `;
                    tr.addEventListener('click', () => handleFileClick(file));
                    listTbody.appendChild(tr);
                });
            }
        }

        // Xử lý khi click vào File
        function handleFileClick(file) {
            if (file.isPdf) {
                openPdfViewer(file.name, file.url);
            } else {
                // Đối với video (Youtube), mở trực tiếp trong Tab mới
                window.open(file.url, '_blank');
            }
        }

        // Mở trình xem PDF trực tuyến
        function openPdfViewer(name, rawPdfUrl) {
            document.getElementById('pdf-viewer-title').innerText = name;
            document.getElementById('pdf-viewer-download').href = rawPdfUrl;
            
            // Sử dụng trình xem PDF mặc định của trình duyệt nhúng qua iframe
            document.getElementById('pdf-iframe').src = rawPdfUrl;
            
            document.getElementById('pdf-viewer-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Khóa cuộn trang chính
        }

        // Đóng trình xem PDF
        function closePdfViewer() {
            document.getElementById('pdf-viewer-modal').classList.add('hidden');
            document.getElementById('pdf-iframe').src = ''; // Giải phóng bộ nhớ iframe
            document.body.style.overflow = ''; // Mở lại cuộn trang chính
        }

        // Cài đặt sự kiện đóng modal PDF
        document.getElementById('pdf-viewer-close').addEventListener('click', closePdfViewer);

        // Xử lý chuyển đổi chế độ xem (View Switcher)
        const btnList = document.getElementById('btn-list-view');
        const btnGrid = document.getElementById('btn-grid-view');

        btnList.addEventListener('click', () => {
            currentView = 'list';
            btnList.className = "px-4 py-1.5 rounded-full bg-blue-100 text-blue-700 shadow-sm transition duration-200";
            btnGrid.className = "px-4 py-1.5 rounded-full text-gray-600 transition duration-200";
            renderData();
        });

        btnGrid.addEventListener('click', () => {
            currentView = 'grid';
            btnGrid.className = "px-4 py-1.5 rounded-full bg-blue-100 text-blue-700 shadow-sm transition duration-200";
            btnList.className = "px-4 py-1.5 rounded-full text-gray-600 transition duration-200";
            renderData();
        });

        // Khởi động trang web
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
